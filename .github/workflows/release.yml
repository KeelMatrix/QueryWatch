name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    env:
      QW_REDACTION_REPO_ROOT: ${{ github.workspace }}/_deps/KeelMatrix.Redaction/app
      QW_TELEMETRY_REPO_ROOT: ${{ github.workspace }}/_deps/KeelMatrix.Telemetry/app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: KeelMatrix/Redaction
          path: _deps/KeelMatrix.Redaction/app
      - uses: actions/checkout@v6
        with:
          repository: KeelMatrix/Telemetry
          path: _deps/KeelMatrix.Telemetry/app
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Bootstrap local dependency feed
        shell: pwsh
        run: pwsh -NoProfile -File build/Dev-PackInstallSamples.ps1
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Pack (core)
        run: dotnet pack ./src/KeelMatrix.QueryWatch/KeelMatrix.QueryWatch.csproj --configuration Release --no-build --include-symbols --p:SymbolPackageFormat=snupkg --output ./artifacts/packages
      - name: Pack (EF Core adapter)
        run: dotnet pack ./src/KeelMatrix.QueryWatch.EfCore/KeelMatrix.QueryWatch.EfCore.csproj --configuration Release --no-build --include-symbols --p:SymbolPackageFormat=snupkg --output ./artifacts/packages
      - name: Sign packages
        shell: bash
        run: |
          # TODO: Sign the nupkg files using your code-signing certificate and timestamp server.
          # See https://learn.microsoft.com/nuget/create-packages/sign-a-package for more information.
          echo "Skipping signing in template. Provide a cert and configure dotnet nuget sign."
      - name: Push packages to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
